server:
  port: 0

spring:
  application:
    name: warehouse

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:h2:mem:warehouse
    driverClassName: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true