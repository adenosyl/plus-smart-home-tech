server:
  port: 8080

spring:
  cloud:
    gateway:

      discovery:
        locator:
          enabled: true

      default-filters:
        - PreserveHostHeader

      routes:

        - id: auth
          uri: lb://shopping-cart
          predicates:
            - Path=/auth/**

        - id: shopping-store
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**
          filters:
            - StripPrefix=1
            - name: Retry
              args:
                retries: 3
                methods:
                  - GET
                statuses:
                  - NOT_FOUND

        - id: warehouse
          uri: lb://warehouse
          predicates:
            - Path=/warehouse/**
          filters:
            - StripPrefix=1

        - id: shopping-cart
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**
          filters:
            - StripPrefix=1

        - id: order
          uri: lb://order
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

        - id: payment
          uri: lb://payment
          predicates:
            - Path=/payment/**
          filters:
            - StripPrefix=1

        - id: delivery
          uri: lb://delivery
          predicates:
            - Path=/delivery/**
          filters:
            - StripPrefix=1